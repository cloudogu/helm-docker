name: Test scripts on push
on:
  push:
    branches: 
      - main
jobs:
  test_scripts:
    name: Test scripts
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v2
        with:
          fetch-depth: 2
      - 
        # this is necessary to prevent desynch state when triggered by previous workflow
        name: Sync git repository
        run: git checkout HEAD^
      - 
        name: Run Bats Tests
        uses: ffurrer2/bats-action@v1
        with:
          args: ./test/checkHelmVersion.bats

  notify_failure:
    permissions:
      issues: write
      contents: read
    if: failure()
    needs: [ test_scripts ]
    uses: ./.github/workflows/notify_failure.yml
    secrets:
      GH_TOKEN: ${{ secrets.CR_PAT }}